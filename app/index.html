<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CardCode</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="toolbar">
      <div class="brand">
        <h1>CardCode</h1>
        <p id="status">Disconnected</p>
      </div>
      <label>
        Target
        <select id="target">
          <option value="mock">Mock harness</option>
          <option value="robot">Robot</option>
          <option value="custom">Custom URL</option>
        </select>
      </label>
      <label class="url-field">
        URL
        <input id="url" value="ws://localhost:9000/runtime" spellcheck="false">
      </label>
      <button id="connect" type="button">Connect</button>
      <button id="run" type="button">Run</button>
      <button id="stop" type="button">Stop</button>
      <button id="reset" type="button">Reset</button>
    </header>

    <section class="main-grid">
      <section class="panel">
        <div class="tabs" role="tablist" aria-label="Editor views">
          <button id="blocks-tab" class="active" type="button" role="tab" aria-controls="blocks-view" aria-selected="true">Blocks</button>
          <button id="code-tab" type="button" role="tab" aria-controls="code-view" aria-selected="false">Code</button>
        </div>
        <div id="blocks-view" role="tabpanel" aria-labelledby="blocks-tab"></div>
        <textarea id="code-view" role="tabpanel" aria-labelledby="code-tab" spellcheck="false"></textarea>
      </section>

      <aside class="side">
        <section>
          <h2>Diagnostics</h2>
          <div id="diagnostics"></div>
        </section>
        <section>
          <h2>Mock Sensors</h2>
          <label>
            Distance
            <input id="sensor-distance" type="number" value="30" min="0" step="1">
          </label>
          <label class="check-row">
            <input id="sensor-button" type="checkbox">
            Button
          </label>
          <label class="check-row">
            <input id="sensor-line-left" type="checkbox">
            Line left
          </label>
          <label class="check-row">
            <input id="sensor-line-right" type="checkbox">
            Line right
          </label>
        </section>
        <section>
          <h2>Telemetry</h2>
          <ol id="telemetry"></ol>
        </section>
      </aside>
    </section>
  </main>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
